<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Logo Accent Gradient (Intelligence / Spark) -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="50%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <!-- Glassmorphic Ring Gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="30%" stop-color="#F59E0B" />
      <stop offset="70%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <!-- Inner Lens Glow -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#10B981" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Subtle Inner Glow -->
  <circle cx="220" cy="220" r="140" fill="url(#glowGrad)" />

  <!-- The Search Ring (Glassmorphic & Gradient Outline) -->
  <circle cx="220" cy="220" r="110" fill="none" stroke="url(#ringGrad)" stroke-width="28" stroke-linecap="round" />

  <!-- Diagonal Handle of Magnifying Glass -->
  <path d="M300 300 L390 390" stroke="url(#ringGrad)" stroke-width="28" stroke-linecap="round" />

  <!-- Spark / Intelligence Star (AI component) at the top-right of the loop -->
  <path d="M340 100 C340 120 324 136 304 136 C324 136 340 152 340 172 C340 152 356 136 376 136 C356 136 340 120 340 100 Z" fill="url(#accentGrad)" />

  <!-- Dynamic Center Node / Sparkle (Internal Knowledge Core) -->
  <path d="M220 170 L226 210 L266 216 L226 222 L220 262 L214 222 L174 216 L214 210 Z" fill="url(#accentGrad)" />
</svg>
